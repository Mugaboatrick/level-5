<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental - Find Your Perfect Car</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">CarRental</a>
        <div class="navbar-links" id="authLinks"></div>
    </nav>

    <div class="hero">
        <h1>Find Your Perfect Ride</h1>
        <p>Browse our wide selection of cars at affordable prices</p>
    </div>

    <div class="container">
        <div class="filter-bar">
            <div class="form-group">
                <label for="searchInput">Search</label>
                <input type="text" id="searchInput" class="form-control" placeholder="Car name or type...">
            </div>
            <div class="form-group">
                <label for="typeFilter">Car Type</label>
                <select id="typeFilter" class="form-control">
                    <option value="">All Types</option>
                    <option value="SUV">SUV</option>
                    <option value="Sedan">Sedan</option>
                    <option value="Sports">Sports</option>
                </select>
            </div>
            <div class="form-group">
                <label for="maxPriceFilter">Max Price/Day</label>
                <input type="number" id="maxPriceFilter" class="form-control" placeholder="e.g. 100">
            </div>
            <button class="btn btn-primary" onclick="loadCars()">Search</button>
        </div>

        <div id="carsContainer" class="grid"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/cars.js"></script>
    <script>
        updateNavbar();
        loadCars();
    </script>
</body>
</html>
